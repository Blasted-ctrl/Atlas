name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  python-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run lint
        run: ruff check .
      - name: Run tests
        env:
          API_SECRET_KEY: test-test-test-test-test-test-1234
        run: pytest -q

  python-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/worker/pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run lint
        run: ruff check .
      - name: Run tests with coverage gate
        run: pytest --cov=worker --cov-report=term-missing
      - name: Enforce forecast quality gate
        env:
          ATLAS_FORECAST_ERROR_THRESHOLD: "15"
        run: python scripts/check_forecast_quality.py

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.1.4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Run lint
        run: pnpm --filter @atlas/web lint
      - name: Build web app
        run: pnpm --filter @atlas/web build

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - python-api
      - python-worker
      - web
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t atlas-api:ci apps/api
      - name: Build worker image
        run: docker build -f apps/worker/Dockerfile -t atlas-worker:ci apps/worker
      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t atlas-web:ci .
